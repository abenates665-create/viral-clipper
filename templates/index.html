```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Video Clipper</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen p-4 md:p-8">
    <div class="max-w-3xl mx-auto">
        <header class="mb-8">
            <h1 class="text-3xl font-bold text-sky-400">AI Video Clipper</h1>
            <p class="text-slate-400">Paste your video URL to generate high-CTR Shorts.</p>
        </header>

        <div class="bg-slate-800 p-6 rounded-xl shadow-lg border border-slate-700">
            <div class="space-y-4">
                <input type="url" id="videoUrl" placeholder="Enter YouTube URL..." class="w-full p-3 rounded-lg bg-slate-900 border border-slate-600 focus:border-sky-500 outline-none">
                <div class="flex gap-4">
                    <input type="number" id="clipCount" value="1" min="1" max="5" class="w-24 p-3 rounded-lg bg-slate-900 border border-slate-600">
                    <button onclick="startProcessing()" class="flex-1 bg-sky-600 hover:bg-sky-500 py-3 rounded-lg font-bold transition">Process Video</button>
                </div>
            </div>

            <div id="statusArea" class="mt-8 hidden">
                <div class="flex justify-between mb-2">
                    <span id="statusText" class="text-sm font-medium">Status: Initializing...</span>
                    <span id="progressPercent" class="text-sm font-bold">0%</span>
                </div>
                <div class="w-full bg-slate-700 h-2 rounded-full overflow-hidden">
                    <div id="progressBar" class="bg-sky-500 h-full w-0 transition-all duration-500"></div>
                </div>
            </div>
        </div>

        <div id="resultArea" class="mt-8 hidden space-y-4">
            <h2 class="text-xl font-bold">Your Clips</h2>
            <div id="clipsGrid" class="grid grid-cols-1 gap-4"></div>
        </div>
    </div>

    <script>
        async function startProcessing() {
            const url = document.getElementById('videoUrl').value;
            const clips = document.getElementById('clipCount').value;
            if(!url) return;

            document.getElementById('statusArea').classList.remove('hidden');
            const response = await fetch('/process', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({url, clips: parseInt(clips)})
            });
            const data = await response.json();
            
            trackProgress(data.job_id);
        }

        function trackProgress(jobId) {
            const evtSource = new EventSource(`/progress/${jobId}`);
            evtSource.onmessage = (e) => {
                const data = JSON.parse(e.data);
                document.getElementById('progressBar').style.width = `${data.progress}%`;
                document.getElementById('progressPercent').innerText = `${data.progress}%`;
                document.getElementById('statusText').innerText = `Status: ${data.status}`;
                
                if(data.progress >= 100) {
                    evtSource.close();
                    displayResults(data.result);
                }
            };
        }

        function displayResults(result) {
            document.getElementById('resultArea').classList.remove('hidden');
            const grid = document.getElementById('clipsGrid');
            result.clips.forEach((clip, idx) => {
                grid.innerHTML += `
                    <div class="bg-slate-800 p-4 rounded-lg border border-slate-700">
                        <p class="font-bold text-sky-300 mb-2">${result.metadata[idx]?.title || 'Generated Clip'}</p>
                        <a href="/download/${clip}" class="text-sm text-sky-400 hover:underline">Download MP4</a>
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
