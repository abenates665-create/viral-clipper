<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Viral Clipper AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { display: none; }
        body { -ms-overflow-style: none; scrollbar-width: none; overscroll-behavior-y: none; }
    </style>
</head>
<body class="bg-gradient-to-br from-gray-900 to-black text-white min-h-screen font-sans selection:bg-purple-500 pb-24">

    <header class="p-6 pt-12 pb-8 text-center sticky top-0 z-10 bg-gradient-to-b from-gray-900 via-gray-900/90 to-transparent">
        <h1 class="text-3xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-purple-400 to-pink-600 drop-shadow-md">
            Viral Clipper
        </h1>
        <p class="text-gray-400 mt-2 text-sm font-medium tracking-wide">Automate Your Short-Form Content</p>
    </header>

    <main class="px-6 flex flex-col gap-6 max-w-md mx-auto relative">
        
        <div class="flex flex-col gap-2">
            <label class="text-sm font-semibold text-gray-300 ml-1">Video Source URL</label>
            <input type="url" id="urlInput" placeholder="Paste YT/Twitch/Twitter Link..." 
                   class="w-full min-h-[56px] px-5 py-4 rounded-2xl bg-gray-800/80 border border-gray-700 text-lg placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-purple-500 transition-all shadow-inner">
        </div>

        <div class="flex flex-col gap-2">
            <label class="text-sm font-semibold text-gray-300 ml-1">Platform Preset</label>
            <div class="relative">
                <select id="presetInput" class="w-full min-h-[56px] px-5 py-4 rounded-2xl bg-gray-800/80 border border-gray-700 text-lg appearance-none focus:outline-none focus:ring-2 focus:ring-purple-500 transition-all shadow-inner">
                    <option value="TikTok">TikTok (2Mbps)</option>
                    <option value="Shorts">YouTube Shorts (1.5Mbps)</option>
                    <option value="Reels">Instagram Reels (3Mbps)</option>
                </select>
                <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-5 text-gray-400">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                </div>
            </div>
        </div>

        <button id="processBtn" onclick="startProcessing()" class="w-full min-h-[60px] mt-4 rounded-2xl bg-gradient-to-r from-purple-600 to-pink-600 text-white text-xl font-bold tracking-wide shadow-lg shadow-purple-500/30 active:scale-[0.98] transition-transform flex justify-center items-center gap-2">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            Generate Clip Now
        </button>

        <div id="progressContainer" class="hidden mt-6 bg-gray-800/50 rounded-3xl p-6 border border-gray-700 backdrop-blur-sm">
            <div class="flex justify-between items-end mb-3">
                <span id="statusText" class="text-sm font-semibold text-purple-300">Waking up server...</span>
                <span id="progressPercent" class="text-2xl font-bold">0%</span>
            </div>
            <div class="w-full bg-gray-900 rounded-full h-3 overflow-hidden shadow-inner">
                <div id="progressBar" class="bg-gradient-to-r from-purple-500 to-pink-500 h-3 rounded-full transition-all duration-500" style="width: 0%"></div>
            </div>
        </div>

        <div id="resultsContainer" class="hidden mt-6 flex flex-col gap-4">
            <h3 class="text-xl font-bold border-b border-gray-700 pb-2">AI Generated Hooks</h3>
            <div id="metadataList" class="flex flex-col gap-4"></div>
        </div>
    </main>

    <button onclick="toggleScheduleModal()" class="fixed bottom-8 right-8 w-16 h-16 bg-blue-600 hover:bg-blue-500 text-white rounded-full shadow-[0_0_20px_rgba(37,99,235,0.5)] flex items-center justify-center active:scale-95 transition-transform z-50">
        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
    </button>

    <div id="scheduleModal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 hidden flex-col justify-end transition-opacity">
        <div class="bg-gray-900 rounded-t-3xl p-6 w-full max-w-md mx-auto transform translate-y-full transition-transform duration-300 border-t border-gray-800 shadow-2xl" id="scheduleDrawer">
            <div class="w-12 h-1.5 bg-gray-700 rounded-full mx-auto mb-6"></div>
            <h2 class="text-2xl font-bold mb-6">Schedule Job</h2>
            <div class="flex flex-col gap-4 mb-8">
                <label class="text-sm font-semibold text-gray-300">Run Date & Time</label>
                <input type="datetime-local" id="scheduleTime" class="w-full min-h-[56px] px-5 py-4 rounded-2xl bg-gray-800 border border-gray-700 text-lg focus:outline-none focus:border-blue-500">
            </div>
            <div class="flex gap-4">
                <button onclick="toggleScheduleModal()" class="flex-1 min-h-[56px] rounded-2xl bg-gray-800 text-gray-300 font-bold text-lg active:bg-gray-700">Cancel</button>
                <button onclick="submitSchedule()" class="flex-1 min-h-[56px] rounded-2xl bg-blue-600 text-white font-bold text-lg shadow-lg shadow-blue-600/30 active:bg-blue-500">Confirm</button>
            </div>
        </div>
    </div>

    <script>
        const urlInput = document.getElementById('urlInput');
        const presetInput = document.getElementById('presetInput');
        const progressContainer = document.getElementById('progressContainer');
        const progressBar = document.getElementById('progressBar');
        const progressPercent = document.getElementById('progressPercent');
        const statusText = document.getElementById('statusText');
        const resultsContainer = document.getElementById('resultsContainer');
        const metadataList = document.getElementById('metadataList');
        const scheduleModal = document.getElementById('scheduleModal');
        const scheduleDrawer = document.getElementById('scheduleDrawer');
        const scheduleTime = document.getElementById('scheduleTime');

        async function startProcessing() {
            const url = urlInput.value.trim();
            if(!url) {
                alert("Please enter a valid URL");
                return;
            }
            progressContainer.classList.remove('hidden');
            resultsContainer.classList.add('hidden');
            progressBar.style.width = '0%';
            progressPercent.innerText = '0%';
            statusText.innerText = 'Connecting...';

            try {
                const response = await fetch('/process', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ url: url, preset: presetInput.value })
                });
                const data = await response.json();
                if(data.job_id) {
                    listenToProgress(data.job_id);
                } else {
                    statusText.innerText = "Error starting job";
                }
            } catch (err) {
                statusText.innerText = "Network Error";
            }
        }

        function listenToProgress(jobId) {
            const evtSource = new EventSource(`/progress/${jobId}`);
            evtSource.onmessage = function(event) {
                const data = JSON.parse(event.data);
                if (data.progress >= 0) {
                    progressBar.style.width = `${data.progress}%`;
                    progressPercent.innerText = `${data.progress}%`;
                    statusText.innerText = data.status;
                }
                if (data.progress >= 100) {
                    evtSource.close();
                    statusText.innerText = "Done!";
                    renderResults(data.result.metadata);
                } else if (data.progress < 0) {
                    evtSource.close();
                    statusText.innerText = data.status;
                    statusText.classList.replace('text-purple-300', 'text-red-400');
                }
            };
            evtSource.onerror = function() {
                evtSource.close();
                statusText.innerText = "Connection lost.";
            };
        }

        function renderResults(metadataArray) {
            metadataList.innerHTML = '';
            metadataArray.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = "bg-gray-800/80 border border-gray-700 p-5 rounded-2xl flex flex-col gap-2";
                card.innerHTML = `
                    <div class="flex items-center justify-between mb-1">
                        <span class="text-xs font-bold text-pink-500 uppercase tracking-wider">Option ${index + 1}</span>
                        <button onclick="copyText(this)" class="text-gray-400 hover:text-white p-2 bg-gray-900 rounded-lg active:scale-95 transition-transform"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg></button>
                    </div>
                    <h4 class="font-bold text-lg text-white copy-target">${item.title}</h4>
                    <p class="text-gray-400 text-sm leading-relaxed copy-target">${item.description}</p>
                `;
                metadataList.appendChild(card);
            });
            resultsContainer.classList.remove('hidden');
        }

        function copyText(btnElement) {
            const card = btnElement.closest('div').parentElement;
            const textToCopy = Array.from(card.querySelectorAll('.copy-target')).map(el => el.innerText).join('\n\n');
            navigator.clipboard.writeText(textToCopy);
            btnElement.innerHTML = `<svg class="w-5 h-5 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>`;
            setTimeout(() => {
                btnElement.innerHTML = `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>`;
            }, 2000);
        }

        function toggleScheduleModal() {
            if (scheduleModal.classList.contains('hidden')) {
                scheduleModal.classList.remove('hidden');
                const now = new Date();
                now.setHours(now.getHours() + 1);
                now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
                scheduleTime.value = now.toISOString().slice(0, 16);
                setTimeout(() => scheduleDrawer.classList.replace('translate-y-full', 'translate-y-0'), 10);
            } else {
                scheduleDrawer.classList.replace('translate-y-0', 'translate-y-full');
                setTimeout(() => scheduleModal.classList.add('hidden'), 300);
            }
        }

        async function submitSchedule() {
            const url = urlInput.value.trim();
            const dateVal = scheduleTime.value;
            if(!url || !dateVal) {
                alert("Please provide URL and Time");
                return;
            }
            const formattedDate = dateVal.replace('T', ' ') + ':00';
            try {
                const response = await fetch('/schedule', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ url: url, preset: presetInput.value, run_date: formattedDate })
                });
                const data = await response.json();
                toggleScheduleModal();
                alert(`Success! Job scheduled for: ${formattedDate}`);
            } catch(e) {
                alert("Failed to schedule job.");
            }
        }
    </script>
</body>
</html>
